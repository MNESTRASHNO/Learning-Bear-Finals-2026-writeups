services:
  redis:
    image: redis
  backend:
    restart: always
    build: ./backend
    environment:
      - REDIS_HOST=redis
      - TOKEN=redacted
  nginx:
    restart: always
    build: ./nginx
    ports:
      - 8008:80
  frontend:
    build: ./frontend
    environment:
      - TOKEN=redacted
      - BACKEND_URL=http://backend:5001
      - FLAG=flag{redacted}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkLens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .12;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow.one {
            top: -200px;
            left: -100px;
            background: #6366f1;
        }

        .bg-glow.two {
            bottom: -200px;
            right: -100px;
            background: #06b6d4;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #c7d2fe, #a5f3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
            margin-top: 6px;
        }

        .search-box {
            position: relative;
            margin-bottom: 40px;
        }

        .input-wrapper {
            display: flex;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(99,102,241,.5);
            box-shadow: 0 0 0 3px rgba(99,102,241,.1);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            padding: 16px 20px;
            font-size: 15px;
            color: #e0e0e0;
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: #4b5563;
        }

        .search-box button {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            padding: 0 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
            font-family: inherit;
            white-space: nowrap;
        }

        .search-box button:hover {
            opacity: .85;
        }

        .search-box button:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .error-msg {
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(239,68,68,.08);
            border: 1px solid rgba(239,68,68,.2);
            border-radius: 12px;
            color: #fca5a5;
            font-size: 13px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .preview-card {
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 16px;
            overflow: hidden;
            display: none;
            animation: fadeUp .4s ease;
        }

        .preview-card.visible {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .preview-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: none;
        }

        .preview-image.visible {
            display: block;
        }

        .preview-body {
            padding: 24px;
        }

        .preview-site {
            font-size: 12px;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        .preview-title {
            font-size: 20px;
            font-weight: 600;
            color: #f3f4f6;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .preview-desc {
            font-size: 14px;
            color: #9ca3af;
            line-height: 1.6;
        }

        .preview-url {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,.06);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-url svg {
            width: 14px;
            height: 14px;
            stroke: #4b5563;
            fill: none;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .preview-url span {
            font-size: 13px;
            color: #4b5563;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .preview-raw {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: rgba(0,0,0,.3);
            border-radius: 10px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            color: #9ca3af;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .preview-raw.visible {
            display: block;
        }

        .raw-toggle {
            margin-top: 12px;
            background: none;
            border: 1px solid rgba(255,255,255,.08);
            color: #6b7280;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: color .2s, border-color .2s;
            font-family: inherit;
        }

        .raw-toggle:hover {
            color: #e0e0e0;
            border-color: rgba(255,255,255,.15);
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }

        .badge.cached {
            background: rgba(34,197,94,.1);
            color: #4ade80;
        }

        .badge.fresh {
            background: rgba(99,102,241,.1);
            color: #818cf8;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin: 0 auto;
        }

        .spinner.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recent-section {
            margin-top: 48px;
        }

        .recent-section h3 {
            font-size: 13px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .recent-item {
            padding: 12px 16px;
            background: rgba(255,255,255,.02);
            border: 1px solid rgba(255,255,255,.05);
            border-radius: 10px;
            cursor: pointer;
            transition: background .2s, border-color .2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .recent-item:hover {
            background: rgba(255,255,255,.05);
            border-color: rgba(255,255,255,.1);
        }

        .recent-favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: rgba(255,255,255,.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .recent-favicon svg {
            width: 12px;
            height: 12px;
            stroke: #6b7280;
            fill: none;
            stroke-width: 2;
        }

        .recent-text {
            overflow: hidden;
        }

        .recent-title {
            font-size: 14px;
            color: #d1d5db;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recent-url {
            font-size: 12px;
            color: #4b5563;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        footer {
            text-align: center;
            margin-top: 64px;
            color: #374151;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                </div>
                <h1>LinkLens</h1>
            </div>
            <p class="subtitle">Paste any URL to generate a rich preview card</p>
        </header>

        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="urlInput" placeholder="https://example.com/article" autofocus>
                <button id="fetchBtn" onclick="fetchPreview()">Preview</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="spinner" id="spinner"></div>

        <div class="preview-card" id="previewCard">
            <img class="preview-image" id="previewImage" alt="">
            <div class="preview-body">
                <div class="preview-site" id="previewSite"></div>
                <div class="preview-title" id="previewTitle"></div>
                <div class="preview-desc" id="previewDesc"></div>
                <div class="preview-url">
                    <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    <span id="previewUrl"></span>
                    <span class="badge" id="cacheBadge"></span>
                </div>
                <div class="preview-raw" id="previewRaw"></div>
                <button class="raw-toggle" id="rawToggle" onclick="toggleRaw()">Show raw response</button>
            </div>
        </div>

        <div class="recent-section" id="recentSection" style="display:none">
            <h3>Recent Previews</h3>
            <div class="recent-list" id="recentList"></div>
        </div>

        <footer>LinkLens v1.4.2</footer>
    </div>

    <script>
        const input = document.getElementById('urlInput');
        const btn = document.getElementById('fetchBtn');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('errorMsg');
        const card = document.getElementById('previewCard');
        const rawBlock = document.getElementById('previewRaw');
        const rawToggle = document.getElementById('rawToggle');

        let lastRaw = '';
        let recents = JSON.parse(localStorage.getItem('linklens_recents') || '[]');

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') fetchPreview();
        });

        renderRecents();

        async function fetchPreview() {
            const url = input.value.trim();
            if (!url) return;

            errorMsg.classList.remove('visible');
            card.classList.remove('visible');
            rawBlock.classList.remove('visible');
            rawToggle.textContent = 'Show raw response';
            spinner.classList.add('visible');
            btn.disabled = true;

            try {
                const resp = await fetch('/api/preview?url=' + encodeURIComponent(url));
                const data = await resp.json();

                if (data.error) {
                    errorMsg.textContent = data.error;
                    errorMsg.classList.add('visible');
                    return;
                }

                const p = data.preview;
                lastRaw = p.raw_body || JSON.stringify(p, null, 2);

                document.getElementById('previewImage').classList.remove('visible');
                if (p.image) {
                    document.getElementById('previewImage').src = p.image;
                    document.getElementById('previewImage').classList.add('visible');
                }

                document.getElementById('previewSite').textContent = p.site_name || new URL(url).hostname;
                document.getElementById('previewTitle').textContent = p.title || 'No title found';
                document.getElementById('previewDesc').textContent = p.description || 'No description available';
                document.getElementById('previewUrl').textContent = url;

                const badge = document.getElementById('cacheBadge');
                badge.textContent = data.cached ? 'cached' : 'fresh';
                badge.className = 'badge ' + (data.cached ? 'cached' : 'fresh');

                card.classList.add('visible');

                addRecent(url, p.title);
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.classList.add('visible');
            } finally {
                spinner.classList.remove('visible');
                btn.disabled = false;
            }
        }

        function toggleRaw() {
            if (rawBlock.classList.contains('visible')) {
                rawBlock.classList.remove('visible');
                rawToggle.textContent = 'Show raw response';
            } else {
                rawBlock.textContent = lastRaw;
                rawBlock.classList.add('visible');
                rawToggle.textContent = 'Hide raw response';
            }
        }

        function addRecent(url, title) {
            recents = recents.filter(r => r.url !== url);
            recents.unshift({ url, title: title || url });
            if (recents.length > 5) recents.pop();
            localStorage.setItem('linklens_recents', JSON.stringify(recents));
            renderRecents();
        }

        function renderRecents() {
            const section = document.getElementById('recentSection');
            const list = document.getElementById('recentList');
            if (recents.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            list.innerHTML = recents.map(r => `
                <div class="recent-item" onclick="document.getElementById('urlInput').value='${r.url.replace(/'/g, "\\'")}';fetchPreview()">
                    <div class="recent-favicon">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <div class="recent-text">
                        <div class="recent-title">${r.title}</div>
                        <div class="recent-url">${r.url}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

; CTF challenge config — makes the LFI+PHPINFO race exploitable
file_uploads = On
upload_tmp_dir = /tmp
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300

; Disable output buffering and enable implicit flush so PHP sends data
; synchronously through the network stack. Each mini-flush keeps the script
; running longer while the temp file is alive — widening the race window.
output_buffering = Off
implicit_flush = On

; No open_basedir or other path restrictions
open_basedir =
allow_url_include = Off
display_errors = On

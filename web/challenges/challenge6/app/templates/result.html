<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            color: #00d4ff;
            margin-bottom: 0.5rem;
        }
        .url-display {
            color: #888;
            font-size: 0.85rem;
            word-break: break-all;
            margin-bottom: 1.5rem;
        }
        .error {
            padding: 1rem;
            background: #1a0a0a;
            border: 1px solid #ff4444;
            border-radius: 8px;
            color: #ff6666;
            margin-bottom: 1.5rem;
        }
        .content-box {
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 1.5rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 70vh;
            overflow-y: auto;
            line-height: 1.5;
        }
        .back {
            display: inline-block;
            margin-top: 1.5rem;
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fetch Result</h1>
        <div class="url-display">{{ url }}</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if content %}
            <div class="content-box">{{ content }}</div>
        {% endif %}

        <a href="/" class="back">&larr; Back</a>
    </div>
</body>
</html>
